# .pre-commit-config.yaml — code quality and safety for MapsProveFiber
# Installation:
#   pip install pre-commit
#   pre-commit install
# Manual execution:
#   pre-commit run --all-files

repos:
  # Formatter
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        args: ["--line-length=100"]

  # Ultra-fast linter (fails if a file required auto-fixes)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
  # Optional: also lint Django templates
        # args: ["--fix", "--exit-non-zero-on-fix", "--extend-select", "DJ"]

  # Import ordering
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  # Generic utility and safety hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: debug-statements
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: check-added-large-files
        args: ['--maxkb=500']

  # Dockerfile lint (hadolint)
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

  # Shell script lint (bash/sh)
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # Optional: secret scanner — enable when needed
  # - repo: https://github.com/Yelp/detect-secrets
  #   rev: v1.5.0
  #   hooks:
  #     - id: detect-secrets
  #       args: ["--baseline", ".secrets.baseline"]

  # Optional: validation/formatting for Django templates
  # - repo: https://github.com/mattsb42-meta/django-template-hooks
  #   rev: v1.0.0
  #   hooks:
  #     - id: django-template-format
