daemon off;

worker_processes  auto;

events {}

rtmp {
    server {
        listen ${RTMP_PORT};
        chunk_size 4096;

        application live {
            live on;
            record off;
            allow publish all;
            allow play all;
            hls on;
            hls_path /var/www/hls;
            hls_type live;
            hls_fragment 3s;
            hls_playlist_length 30s;
            hls_fragment_naming system;
            hls_cleanup on;
            hls_continuous on;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;

    server {
        listen ${HTTP_PORT};
        server_name _;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

        # Proxy reverso para MediaMTX WHEP (porta 8889)
        # Resolve CSP/CORS e unifica endpoints em uma porta única
        location /camera-stream/ {
            # Preflight OPTIONS - responder imediatamente sem proxy
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            # Remove o prefixo /camera-stream/ e encaminha para MediaMTX
            rewrite ^/camera-stream/(.*) /$1 break;
            
            # Encaminhar para MediaMTX na porta 8889
            proxy_pass http://mediamtx:8889;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Headers CORS necessários para WHEP
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Location, Content-Type' always;
            
            # Timeouts para conexões WebRTC/WHEP
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ^~ /hls/ {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
            
            # Proxy reverso para MediaMTX HLS (porta 8888)
            # MediaMTX serve em /<stream>/index.m3u8, então removemos apenas /hls/ prefix
            # /hls/gateway_28/index.m3u8 → /gateway_28/index.m3u8
            rewrite ^/hls/(.*)$ /$1 break;
            proxy_pass http://mediamtx:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # CORS headers for HLS manifests and segments
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
            add_header Cache-Control "no-cache" always;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }
    }
}
