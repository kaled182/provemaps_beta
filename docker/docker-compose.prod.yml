# Docker Compose - Production Configuration
# MapsProveFiber v2.1.0 - Fiber Optic Network Management Platform
# 
# Uso:
#   docker compose -f docker/docker-compose.prod.yml up -d
#
# Includes:
#   - Nginx reverse proxy with SSL
#   - PostgreSQL 15 + PostGIS
#   - Redis cache
#   - Django (Gunicorn + Uvicorn workers)
#   - Celery worker + beat scheduler
#   - Auto-renewal SSL certificates
#   - Health checks
#   - Resource limits
#   - Security hardening

services:
  # ==========================================
  # NGINX - Reverse Proxy & SSL Termination
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: mapsprovefiber_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - ../backend/staticfiles:/app/staticfiles:ro
      - ../backend/media:/app/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ==========================================
  # CERTBOT — Let's Encrypt SSL
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: mapsprovefiber_certbot
    restart: "no"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Run once on demand — see scripts/certbot-renew.sh for renewal
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $$!;
             done"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ==========================================
  # DJANGO - Web Application (Gunicorn + ASGI)
  # ==========================================
  web:
    build:
      context: ..
      dockerfile: docker/dockerfile
      args:
        PYTHON_VERSION: "3.12"
    container_name: mapsprovefiber_web
    restart: unless-stopped
    command: >
      gunicorn core.asgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --timeout 600
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile /app/logs/gunicorn-access.log
      --error-logfile /app/logs/gunicorn-error.log
      --log-level info
    entrypoint: ["/docker-entrypoint.sh"]
    expose:
      - "8000"
    env_file:
      - ../.env.production
    working_dir: /app/backend
    environment:
      # Database
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-mapsprovefiber}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      
      # Django
      DJANGO_SETTINGS_MODULE: settings.prod
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Allowed hosts required}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?CSRF trusted origins required}
      
      # Redis (autenticado)
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0

      # Security
      SECURE_SSL_REDIRECT: "True"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
      SECURE_HSTS_SECONDS: "31536000"
      
      # Paths
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: "1"
      
      # GDAL/GEOS
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      
      # Initialization
      INIT_MIGRATE: "true"
      INIT_COLLECTSTATIC: "true"
      INIT_ENSURE_SUPERUSER: "false"
      
      # Feature Flags
      ENABLE_FILTERS: "True"
      ENABLE_SEARCH: "True"
      ENABLE_URL_PERSISTENCE: "True"
      USE_VUE_DASHBOARD: "true"
      
      # Health Checks
      HEALTHCHECK_DB_TIMEOUT: "5"
      HEALTHCHECK_FORCE_NO_TIMEOUT: "false"
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: "production"
      SENTRY_TRACES_SAMPLE_RATE: "0.1"
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../.env.production:/app/.env:ro
      - app_logs:/app/logs
      - app_media:/app/media
      - app_staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; resp = urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5); exit(0 if resp.getcode() == 200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # CELERY WORKER - Asynchronous Tasks
  # ==========================================
  celery:
    build:
      context: ..
      dockerfile: docker/dockerfile
      args:
        PYTHON_VERSION: "3.12"
    container_name: mapsprovefiber_celery
    restart: unless-stopped
    command: >
      celery -A core.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,zabbix,maps
      --max-tasks-per-child=1000
      --time-limit=3600
      --soft-time-limit=3000
      --logfile=/app/logs/celery-worker.log
    entrypoint: ["/docker-entrypoint.sh"]
    env_file:
      - ../.env.production
    working_dir: /app/backend
    environment:
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-mapsprovefiber}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DJANGO_SETTINGS_MODULE: settings.prod
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: "1"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      CELERY_METRICS_ENABLED: "true"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../database:/app/database
      - ../.env.production:/app/.env:ro
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.celery_app inspect ping -d celery@$$HOSTNAME -t 5 | grep -qi pong || ps aux | grep -q '[c]elery worker'"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # CELERY BEAT - Periodic Task Scheduler
  # ==========================================
  celery-beat:
    build:
      context: ..
      dockerfile: docker/dockerfile
      args:
        PYTHON_VERSION: "3.12"
    container_name: mapsprovefiber_celery_beat
    restart: unless-stopped
    command: >
      celery -A core.celery_app beat
      --loglevel=info
      --logfile=/app/logs/celery-beat.log
      --pidfile=/tmp/celerybeat.pid
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    entrypoint: ["/docker-entrypoint.sh"]
    env_file:
      - ../.env.production
    working_dir: /app/backend
    environment:
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-mapsprovefiber}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DJANGO_SETTINGS_MODULE: settings.prod
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: "1"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Redis password required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../database:/app/database
      - ../.env.production:/app/.env:ro
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[c]elery beat'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==========================================
  # POSTGRESQL + POSTGIS - Database
  # ==========================================
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: mapsprovefiber_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mapsprovefiber}
      POSTGRES_USER: ${DB_USER:-mapsprovefiber}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"  # Apenas localhost para segurança
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mapsprovefiber} -d ${DB_NAME:-mapsprovefiber}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=2621kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

  # ==========================================
  # REDIS - Cache & Message Broker
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: mapsprovefiber_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Redis password required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - backend
    ports:
      - "127.0.0.1:6379:6379"  # Apenas localhost para segurança
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==========================================
  # PROMETHEUS — perfil: monitoring
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: mapsprovefiber_prometheus
    restart: unless-stopped
    profiles: [monitoring, full]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # GRAFANA — perfil: monitoring
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: mapsprovefiber_grafana
    restart: unless-stopped
    profiles: [monitoring, full]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Grafana admin password required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # MEDIAMTX (RTMP/RTSP/WebRTC) — perfil: video
  # ==========================================
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mapsprovefiber_mediamtx
    restart: unless-stopped
    profiles: [video, full]
    environment:
      MTX_PROTOCOLS: tcp
      MTX_WEBRTC: "yes"
      MTX_WEBRTCICESERVERS2: '[{"urls":["stun:stun.l.google.com:19302"]}]'
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "1935:1935"
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # WHATSAPP QR — perfil: whatsapp
  # ==========================================
  whatsapp-qr:
    build:
      context: ../services/whatsapp-qr
    container_name: mapsprovefiber_whatsapp_qr
    restart: unless-stopped
    profiles: [whatsapp, full]
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - whatsapp_qr_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================
# NETWORKS
# ==========================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false  # Permitir acesso externo para Zabbix API

# ==========================================
# VOLUMES - Persistent Data
# ==========================================
volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_media:
    driver: local
  app_staticfiles:
    driver: local
  nginx_logs:
    driver: local
  certbot_webroot:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  whatsapp_qr_data:
    driver: local
  letsencrypt:
    driver: local
