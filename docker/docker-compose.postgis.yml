# PostgreSQL + PostGIS Configuration (Phase 10)
# 
# Usage:
#   docker-compose -f docker/docker-compose.postgis.yml up -d
#
# Environment variables needed:
#   DB_ENGINE=postgis
#   DB_HOST=localhost (or postgres container name)
#   DB_PORT=5432
#   DB_NAME=mapsprovefiber
#   DB_USER=provemaps
#   DB_PASSWORD=<secure_password>

services:
  web:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: mapsprovefiber_web
    command: >
      gunicorn core.asgi:application
      -k uvicorn.workers.UvicornWorker
      -b 0.0.0.0:8000
      --workers 3
      --timeout 120
      --max-requests 1000
    entrypoint: ["/docker-entrypoint.sh"]
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    working_dir: /app/backend
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-settings.dev}
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-provemaps}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: 1
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      REDIS_URL: redis://redis:6379/0
      STATIC_ASSET_VERSION: "1.0.2"
      INIT_MIGRATE: "true"
      INIT_COLLECTSTATIC: "true"
      INIT_ENSURE_SUPERUSER: "true"
      CELERY_STATUS_TIMEOUT: "6"
      CELERY_PING_TIMEOUT: "2"
      CELERY_METRICS_ENABLED: "true"
      CELERY_METRICS_UPDATE_INTERVAL: "30"
      HEALTHCHECK_DB_TIMEOUT: "5"
      HEALTHCHECK_FORCE_NO_TIMEOUT: "true"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
      SERVICE_ACCOUNT_WEBHOOK_CONNECT_TIMEOUT: "3"
      SERVICE_ACCOUNT_WEBHOOK_READ_TIMEOUT: "5"
      ENV_FILE_PATH: /app/database/runtime.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; resp = urllib.request.urlopen('http://localhost:8000/ready', timeout=5); exit(0 if resp.getcode() == 200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../doc:/app/doc
      - ../scripts:/app/scripts
      - ../.env:/app/.env:ro
      - ../logs:/app/backend/logs

  celery:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: mapsprovefiber_celery
    command: celery -A core.celery_app worker -Q default,zabbix,maps -l info -c 4
    entrypoint: ["/docker-entrypoint.sh"]
    env_file:
      - ../.env
    working_dir: /app/backend
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-settings.dev}
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-provemaps}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: 1
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      REDIS_URL: redis://redis:6379/0
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      CELERY_METRICS_ENABLED: "true"
      CELERY_METRICS_UPDATE_INTERVAL: "30"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
      SERVICE_ACCOUNT_WEBHOOK_CONNECT_TIMEOUT: "3"
      SERVICE_ACCOUNT_WEBHOOK_READ_TIMEOUT: "5"
      ENV_FILE_PATH: /app/database/runtime.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.celery_app inspect ping -d celery@$$HOSTNAME -t 5 | grep -qi pong || ps aux | grep -q '[c]elery worker'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../doc:/app/doc
      - ../scripts:/app/scripts
      - ../.env:/app/.env:ro
      - ../logs:/app/backend/logs

  beat:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: mapsprovefiber_beat
    command: celery -A core.celery_app beat -l info --pidfile=/tmp/celerybeat.pid
    entrypoint: ["/docker-entrypoint.sh"]
    env_file:
      - ../.env
    working_dir: /app/backend
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-settings.dev}
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-provemaps}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: 1
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      REDIS_URL: redis://redis:6379/0
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      CELERY_METRICS_ENABLED: "true"
      CELERY_METRICS_UPDATE_INTERVAL: "30"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
      SERVICE_ACCOUNT_WEBHOOK_CONNECT_TIMEOUT: "3"
      SERVICE_ACCOUNT_WEBHOOK_READ_TIMEOUT: "5"
      ENV_FILE_PATH: /app/database/runtime.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery beat' >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../doc:/app/doc
      - ../scripts:/app/scripts
      - ../.env:/app/.env:ro
      - ../logs:/app/backend/logs

  postgres:
    # Official PostGIS image from Docker Hub:
    #   https://hub.docker.com/r/postgis/postgis
    # Override POSTGIS_IMAGE env var to upgrade or pin digest.
    # Example (PowerShell): $env:POSTGIS_IMAGE="postgis/postgis:16-3.4"
    # Example (digest pin): $env:POSTGIS_IMAGE="postgis/postgis@sha256:<digest>"
    image: ${POSTGIS_IMAGE:-postgis/postgis:16-3.4}
    container_name: mapsprovefiber_postgis
    environment:
      POSTGRES_DB: ${DB_NAME:-mapsprovefiber}
      POSTGRES_USER: ${DB_USER:-provemaps}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
      # Enable PostGIS extensions automatically
      POSTGIS_GDAL_ENABLED_DRIVERS: ENABLE_ALL
      POSTGIS_ENABLE_OUTDB_RASTERS: 1
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_postgis.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-provemaps} -d ${DB_NAME:-mapsprovefiber}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=1GB"
      # PostGIS tuning
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"

  # PgAdmin (optional, for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mapsprovefiber_pgadmin
    environment:
      # Use a valid deliverable domain to avoid startup email validation failure
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools  # Start only with: docker-compose --profile tools up

  # GDAL utility container (optional, for spatial ETL / conversions)
  # Usage examples:
  #   docker compose -f docker/docker-compose.postgis.yml run --rm gdal ogrinfo -al /data/input.geojson
  #   docker compose -f docker/docker-compose.postgis.yml run --rm gdal ogr2ogr -f PostgreSQL PG:"host=postgres dbname=$DB_NAME user=$DB_USER password=$DB_PASSWORD" /data/input.shp -nln imported_layer
  gdal:
    image: ghcr.io/osgeo/gdal:alpine-normal-latest
    container_name: mapsprovefiber_gdal
    environment:
      # Pass database connection info for scripts that connect directly
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-provemaps}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      # Set default GDAL configuration (tweak as needed)
      GDAL_CACHEMAX: 128  # MB
      CPL_DEBUG: OFF
    volumes:
      - ./data:/data:rw              # Place input/output spatial files here
      - ./scripts:/scripts:ro        # Optionally mount helper scripts
    working_dir: /data
    # Keep container idle by default; override command when running tasks
    command: ["sleep", "infinity"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools  # Launch with: docker compose --profile tools up gdal

  # Backend test runner with GDAL (GeoDjango) support.
  # Provides an isolated environment to execute pytest using PostGIS.
  backend-test:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: mapsprovefiber_backend_test
    environment:
      DJANGO_SETTINGS_MODULE: settings.dev
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-mapsprovefiber}
      DB_USER: ${DB_USER:-provemaps}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      PYTEST_ADDOPTS: -q
    volumes:
      - ../backend:/app/backend:rw
      - ../scripts:/app/scripts:ro
    working_dir: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
    # GDAL libs baked into image; run tests directly after migrations.
    command: ["bash","-c","python manage.py migrate --noinput && pytest"]
    profiles:
      - tools
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: mapsprovefiber_redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
    name: mapsprovefiber_postgres_data
  pgadmin_data:
    name: mapsprovefiber_pgadmin_data
  redis_data:
    name: mapsprovefiber_redis_data
