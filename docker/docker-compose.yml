services:
  web:
    build:
      context: ..
      dockerfile: docker/dockerfile
    command: >
      gunicorn core.asgi:application
      -k uvicorn.workers.UvicornWorker
      -b 0.0.0.0:8000
      --workers 3
      --timeout 120
      --max-requests 1000
    entrypoint: ["/docker-entrypoint.sh"]
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    working_dir: /app/backend
    environment:
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: app
      DB_USER: app
      DB_PASSWORD: app
      DJANGO_SETTINGS_MODULE: settings.dev
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: 1
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      REDIS_URL: redis://redis:6379/0
      # Static Asset Cache Busting (Sprint 1)
      STATIC_ASSET_VERSION: "1.0.2"
      # Sprint 1 Feature Flags (Filters & Search)
      ENABLE_FILTERS: "True"
      ENABLE_SEARCH: "True"
      ENABLE_URL_PERSISTENCE: "True"
      # Disable Debug Toolbar in Docker (prevents redirect interception)
      ENABLE_DEBUG_TOOLBAR: "False"
      # Vue 3 Dashboard Feature Flags (Phase 11 - Canary Rollout) - TEMPORARILY DISABLED FOR SITE-BASED MAP
      USE_VUE_DASHBOARD: "False"
      VUE_DASHBOARD_ROLLOUT_PERCENTAGE: "0"
      # Sentry APM (Phase 12 - Error Tracking & Performance Monitoring)
      SENTRY_DSN: "https://2b2a767ff10ec5ce098ba093c054a300@o4510353484742656.ingest.us.sentry.io/4510353502371840"
      SENTRY_ENVIRONMENT: "development"
      SENTRY_TRACES_SAMPLE_RATE: "0.1"
      SENTRY_PROFILES_SAMPLE_RATE: "0.1"
      INIT_MIGRATE: "true"
      INIT_COLLECTSTATIC: "true"
      INIT_ENSURE_SUPERUSER: "true"
      CELERY_STATUS_TIMEOUT: "6"
      CELERY_PING_TIMEOUT: "2"
      CELERY_METRICS_ENABLED: "true"
      CELERY_METRICS_UPDATE_INTERVAL: "30"
      HEALTHCHECK_DB_TIMEOUT: "5"
      HEALTHCHECK_FORCE_NO_TIMEOUT: "true"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
      SERVICE_ACCOUNT_WEBHOOK_CONNECT_TIMEOUT: "3"
      SERVICE_ACCOUNT_WEBHOOK_READ_TIMEOUT: "5"
      ENV_FILE_PATH: /app/database/runtime.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; resp = urllib.request.urlopen('http://localhost:8000/ready', timeout=5); exit(0 if resp.getcode() == 200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      # Exclude vue-spa from volume mount to preserve built frontend assets
      - /app/backend/staticfiles/vue-spa
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../doc:/app/doc
      - ../scripts:/app/scripts
      - ../.env:/app/.env:ro
      - ../logs:/app/backend/logs

  celery:
    build:
      context: ..
      dockerfile: docker/dockerfile
    command: celery -A core.celery_app worker -Q default,zabbix,maps -l info -c 4
    entrypoint: ["/docker-entrypoint.sh"]
    env_file:
      - ../.env
    working_dir: /app/backend
    environment:
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: app
      DB_USER: app
      DB_PASSWORD: app
      DJANGO_SETTINGS_MODULE: settings.dev
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: 1
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      REDIS_URL: redis://redis:6379/0
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      CELERY_METRICS_ENABLED: "true"
      CELERY_METRICS_UPDATE_INTERVAL: "30"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
      SERVICE_ACCOUNT_WEBHOOK_CONNECT_TIMEOUT: "3"
      SERVICE_ACCOUNT_WEBHOOK_READ_TIMEOUT: "5"
      ENV_FILE_PATH: /app/database/runtime.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.celery_app inspect ping -d celery@$$HOSTNAME -t 5 | grep -qi pong || ps aux | grep -q '[c]elery worker'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../doc:/app/doc
      - ../scripts:/app/scripts
      - ../.env:/app/.env:ro
      - ../logs:/app/backend/logs

  beat:
    build:
      context: ..
      dockerfile: docker/dockerfile
    command: celery -A core.celery_app beat -l info --pidfile=/tmp/celerybeat.pid
    entrypoint: ["/docker-entrypoint.sh"]
    env_file:
      - ../.env
    working_dir: /app/backend
    environment:
      DB_ENGINE: postgis
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: app
      DB_USER: app
      DB_PASSWORD: app
      DJANGO_SETTINGS_MODULE: settings.dev
      SECRET_KEY: "django-insecure-docker-dev-key-change-in-production"
      PYTHONPATH: "/app/backend:/app"
      PYTHONUNBUFFERED: 1
      GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
      GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
      PROJ_LIB: /usr/share/proj
      REDIS_URL: redis://redis:6379/0
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
      CELERY_METRICS_ENABLED: "true"
      CELERY_METRICS_UPDATE_INTERVAL: "30"
      SERVICE_ACCOUNT_ROTATION_INTERVAL_SECONDS: "3600"
      SERVICE_ACCOUNT_WEBHOOK_CONNECT_TIMEOUT: "3"
      SERVICE_ACCOUNT_WEBHOOK_READ_TIMEOUT: "5"
      ENV_FILE_PATH: /app/database/runtime.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery beat' >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ../docker/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ../backend:/app/backend
      - ../frontend:/app/frontend
      - ../database:/app/database
      - ../doc:/app/doc
      - ../scripts:/app/scripts
      - ../.env:/app/.env:ro
      - ../logs:/app/backend/logs

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
      POSTGIS_GDAL_ENABLED_DRIVERS: ENABLE_ALL
      POSTGIS_ENABLE_OUTDB_RASTERS: 1
    # Map to host port 5433 to avoid conflicts with local Postgres installations on 5432
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_postgis.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
      MARIADB_INITDB_SKIP_TZINFO: 1
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles:
      - mysql

volumes:
  mariadb_data:
  redis_data:
  postgres_data: