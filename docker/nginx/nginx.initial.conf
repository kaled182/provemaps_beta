# nginx.initial.conf — HTTP-only bootstrap config
# Used ONCE to obtain the first Let's Encrypt certificate via ACME HTTP-01.
#
# Usage:
#   1. Mount this file as nginx.conf
#   2. docker compose up -d nginx
#   3. Run certbot to obtain cert
#   4. Swap to nginx.prod.conf and reload nginx
#
# See scripts/deploy.sh for the automated flow.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------
    # HTTP — serve ACME challenge only, redirect all else
    # -------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # ACME HTTP-01 challenge for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (needed by compose healthcheck before SSL)
        location /healthz/ {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Everything else: return 200 until cert is ready
        location / {
            return 200 "Aguardando certificado SSL...\n";
            add_header Content-Type text/plain;
        }
    }
}
