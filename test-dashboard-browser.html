<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Dashboard Endpoint</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        pre {
            background: #252526;
            padding: 20px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background: #1177bb;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .success { background: #0e7a0d20; border-left: 3px solid #0e7a0d; }
        .error { background: #a1260d20; border-left: 3px solid: #a1260d; }
        .info { background: #0e639c20; border-left: 3px solid #0e639c; }
    </style>
</head>
<body>
    <h1>Teste do Endpoint Dashboard</h1>
    
    <div>
        <button onclick="testDashboard()">Testar /maps_view/api/dashboard/data/</button>
        <button onclick="testDevices()">Testar /api/v1/devices/</button>
        <button onclick="testSites()">Testar /api/v1/sites/</button>
    </div>
    
    <div id="status"></div>
    <pre id="output">Clique em um botão para testar...</pre>

    <script>
        async function testDashboard() {
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            status.innerHTML = '<div class="status info">Carregando dashboard...</div>';
            output.textContent = 'Carregando...';
            
            try {
                const response = await fetch('/maps_view/api/dashboard/data/', {
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Análise dos dados
                const hostsCount = data.hosts_status ? data.hosts_status.length : 0;
                const summary = data.hosts_summary || {};
                
                status.innerHTML = `
                    <div class="status ${hostsCount > 0 ? 'success' : 'error'}">
                        <strong>Status:</strong> ${response.status} ${response.statusText}<br>
                        <strong>Hosts Retornados:</strong> ${hostsCount}<br>
                        <strong>Summary:</strong> Total: ${summary.total || 0}, 
                        Available: ${summary.available || 0}, 
                        Unavailable: ${summary.unavailable || 0}
                    </div>
                `;
                
                output.textContent = JSON.stringify(data, null, 2);
                
                // Log para debugging
                console.log('[Dashboard Test] Response:', data);
                console.log('[Dashboard Test] First host:', data.hosts_status?.[0]);
                
            } catch (error) {
                status.innerHTML = `<div class="status error"><strong>ERRO:</strong> ${error.message}</div>`;
                output.textContent = `ERRO:\n${error.stack}`;
                console.error('[Dashboard Test] Error:', error);
            }
        }
        
        async function testDevices() {
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            status.innerHTML = '<div class="status info">Carregando devices...</div>';
            output.textContent = 'Carregando...';
            
            try {
                const response = await fetch('/api/v1/devices/', {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const devices = Array.isArray(data) ? data : (data.results || []);
                const devicesWithZabbix = devices.filter(d => d.zabbix_hostid);
                
                status.innerHTML = `
                    <div class="status success">
                        <strong>Status:</strong> ${response.status} OK<br>
                        <strong>Total Devices:</strong> ${devices.length}<br>
                        <strong>Devices com Zabbix ID:</strong> ${devicesWithZabbix.length}
                    </div>
                `;
                
                output.textContent = JSON.stringify(data, null, 2);
                
            } catch (error) {
                status.innerHTML = `<div class="status error"><strong>ERRO:</strong> ${error.message}</div>`;
                output.textContent = `ERRO:\n${error.stack}`;
            }
        }
        
        async function testSites() {
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            status.innerHTML = '<div class="status info">Carregando sites...</div>';
            output.textContent = 'Carregando...';
            
            try {
                const response = await fetch('/api/v1/sites/', {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const sites = Array.isArray(data) ? data : (data.results || []);
                
                status.innerHTML = `
                    <div class="status success">
                        <strong>Status:</strong> ${response.status} OK<br>
                        <strong>Total Sites:</strong> ${sites.length}
                    </div>
                `;
                
                output.textContent = JSON.stringify(data, null, 2);
                
            } catch (error) {
                status.innerHTML = `<div class="status error"><strong>ERRO:</strong> ${error.message}</div>`;
                output.textContent = `ERRO:\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
