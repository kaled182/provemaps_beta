[pytest]

# =============================================================================
# BASE PYTEST CONFIGURATION
# =============================================================================

DJANGO_SETTINGS_MODULE = settings.test
pythonpath = . backend

# Default execution options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --durations=10
    -ra

# Warnings to ignore
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning

# =============================================================================
# MARKERS (TEST CATEGORIES)
# =============================================================================

markers =
    slow: slow tests (run with --slow or -m "slow")
    integration: integration tests (require external services)
    unit: unit tests (isolated and fast)
    db: tests using the database
    celery: Celery task tests
    zabbix: Zabbix integration tests
    maps: maps/geolocation tests
    api: REST API tests
    auth: authentication/authorization tests
    security: security tests
    views: Django view tests
    models: Django model tests
    forms: Django form tests
    middleware: middleware tests

# =============================================================================
# TEST DISCOVERY
# =============================================================================

testpaths =
    tests
    core/tests
    maps_view/tests
    setup_app/tests
    monitoring/tests
    inventory/tests

python_files =
    test_*.py
    *_test.py
    *_tests.py

python_classes =
    Test*
    *Test

python_functions =
    test_*

# Ignored directories
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    *.egg-info
    build
    dist
    node_modules
    .venv
    venv
    media
    staticfiles
    backend/routes_builder/tests
    test_errors.txt

# =============================================================================
# CLI LOGGING (optional)
# =============================================================================

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

