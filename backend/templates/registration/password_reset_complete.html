{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>Senha Atualizada | Monitoring Portal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            portal: {
              light: '#E6F0FF',
              DEFAULT: '#004AAD',
              dark: '#002E6D',
            },
          },
        },
      },
    };
  </script>
</head>
<body class="h-full bg-portal-dark flex items-center justify-center p-6">

  <div class="w-full max-w-sm animate-fade-in">
    <div class="bg-white/10 backdrop-blur-md rounded-2xl shadow-2xl border border-white/20 p-8 text-center">
      <div class="flex flex-col items-center mb-6">
        {% with setup=setup_logo %}
          {% if setup and setup.logo %}
            <img src="{{ setup.logo.url }}" alt="Logo" class="h-16 w-auto mb-3">
          {% else %}
            <img src="{% static 'img/logo.png' %}" alt="Logo" class="h-16 w-auto mb-3">
          {% endif %}
        {% endwith %}
        <h1 class="text-xl font-semibold text-white tracking-wide">
          Senha atualizada
        </h1>
        <p class="text-xs text-gray-200 mt-2">
          Sua senha foi alterada com sucesso.
        </p>
      </div>

      <a href="/accounts/login/"
         class="inline-flex items-center justify-center w-full rounded-lg bg-portal-light py-2.5 text-portal-dark font-semibold hover:bg-white hover:text-portal-dark focus:outline-none focus:ring-4 focus:ring-portal-light/40 transition-all duration-200 shadow-lg">
        Entrar
      </a>

      <p class="mt-6 text-xs text-gray-300">
        &copy; {% now 'Y' %} Fiber Monitoring
      </p>
    </div>
  </div>

  <style>
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 0.6s ease-out;
    }
  </style>

</body>
</html>
